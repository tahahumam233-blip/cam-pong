<!doctype html><html><head><meta charset="utf-8">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#050510">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="icon" type="image/png" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
/* ============ design system: one font, two brand colors, glass cards ============ */
:root{--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);--sal:env(safe-area-inset-left,0px);--sar:env(safe-area-inset-right,0px);
 --cy:#00f0ff;--mg:#ff44aa;--ink:#cfeaff}
*{margin:0;box-sizing:border-box}
body{background:#050510;color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;position:fixed;inset:0;touch-action:none;-webkit-user-select:none;user-select:none}
h1{font-weight:200;font-size:42px;letter-spacing:6px;
 background:linear-gradient(90deg,var(--cy),#9fb4ff,var(--mg));-webkit-background-clip:text;background-clip:text;color:transparent;
 filter:drop-shadow(0 0 18px rgba(0,240,255,.45));animation:rev 1.1s cubic-bezier(.2,.7,.2,1)}
@keyframes rev{0%{opacity:0;letter-spacing:26px;filter:blur(10px)}100%{opacity:1;letter-spacing:6px;filter:blur(0)}}
h2{font-weight:300;letter-spacing:4px;margin-bottom:8px}
.card{background:rgba(13,22,52,.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
 border:1px solid rgba(0,240,255,.16);border-radius:22px;padding:22px 26px;
 box-shadow:0 0 40px rgba(0,80,160,.25),inset 0 0 30px rgba(0,140,255,.05);display:flex;flex-direction:column;align-items:center}
button{background:linear-gradient(135deg,var(--cy),#0080ff);color:#001828;border:0;padding:14px 26px;
 font:700 15px 'Segoe UI',sans-serif;border-radius:14px;margin:6px;letter-spacing:1.5px;
 box-shadow:0 0 16px rgba(0,240,255,.35);transition:transform .12s,box-shadow .15s;min-width:230px}
button:hover{box-shadow:0 0 26px rgba(0,240,255,.6)}
button:active{transform:scale(.94)}
.ghost{background:rgba(19,35,74,.85)!important;color:#9bd!important;box-shadow:inset 0 0 0 1px rgba(120,170,255,.25)!important}
#menu,#link,#win,#pp{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
 padding:calc(16px + var(--sat)) calc(16px + var(--sar)) calc(16px + var(--sab)) calc(16px + var(--sal));z-index:3;
 background:radial-gradient(ellipse at 50% 18%,#131345,#050510 72%)}
#win,#pp{background:rgba(4,6,18,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
#msg{margin:10px;font-size:15px;max-width:300px;color:#9cf;min-height:40px}
.pulse{animation:pul 1.6s ease-in-out infinite}
@keyframes pul{50%{opacity:.45}}
/* QR hologram frame with travelling scan line */
.qrwrap{position:relative;padding:14px;border-radius:18px;background:rgba(8,16,40,.6);
 border:1px solid rgba(0,240,255,.35);box-shadow:0 0 30px rgba(0,240,255,.25),inset 0 0 18px rgba(0,240,255,.08);margin:8px}
.qrwrap::after{content:'';position:absolute;left:10px;right:10px;height:2px;border-radius:2px;
 background:linear-gradient(90deg,transparent,var(--cy),transparent);animation:scan 2.4s ease-in-out infinite;box-shadow:0 0 12px var(--cy)}
@keyframes scan{0%,100%{top:10px}50%{top:calc(100% - 12px)}}
#qr{background:#fff;border-radius:8px;display:block;max-width:72vw}
#code{font:800 30px Consolas,monospace;letter-spacing:12px;color:var(--cy);text-shadow:0 0 18px var(--cy);margin:6px 0 0 6px;min-height:38px}
#set{margin-top:6px}
.row{display:flex;gap:5px;align-items:center;margin:5px;justify-content:center}
.row b{width:88px;text-align:right;font-size:10px;color:#79b;font-weight:600;letter-spacing:1px}
.row button{padding:8px 10px;font-size:11px;margin:0;background:rgba(19,35,74,.9);color:#9bd;box-shadow:none;border-radius:9px;min-width:0;letter-spacing:.5px}
.row button.on{background:linear-gradient(135deg,var(--cy),#0080ff);color:#001828;box-shadow:0 0 10px rgba(0,240,255,.4)}
.stats{margin:10px 0 14px;font-size:14px;color:#9bd;line-height:1.9;letter-spacing:1px}
.stats b{color:var(--ink)}
#wt{font-size:34px;font-weight:800;letter-spacing:5px;animation:rev .8s cubic-bezier(.2,.7,.2,1)}
#pb{position:fixed;top:calc(10px + var(--sat));right:calc(12px + var(--sar));z-index:2;min-width:0;padding:5px 13px;
 background:rgba(19,35,74,.55);color:#9bd;box-shadow:none;font-size:14px;border-radius:10px}
@media (orientation:landscape){#pb{top:auto;bottom:calc(10px + var(--sab));right:calc(12px + var(--sar))}}
p.hint{color:#567;max-width:300px;margin-top:10px;font-size:12.5px;line-height:1.5}
[hidden]{display:none!important}
</style></head><body>
<div id="menu"><h1>CAM PONG</h1>
<div class="card" style="margin-top:14px">
<button onclick="startLocal()">1 PHONE · 2 PLAYERS</button>
<button onclick="startHost()">2 PHONES · HOST</button>
<button onclick="askJoin()" class="ghost">JOIN WITH CODE</button>
<button onclick="$('set').hidden=!$('set').hidden" class="ghost">⚙ SETTINGS</button>
<div id="set" hidden></div>
</div>
<p class="hint">Player 2: scan the host's QR with your phone camera — it joins by itself. Host's settings apply online.</p></div>
<div id="link" hidden><div class="card"><div id="msg"></div>
<div class="qrwrap" id="qrw" hidden><canvas id="qr"></canvas></div>
<div id="code"></div>
<button onclick="location.reload()" class="ghost">CANCEL</button></div></div>
<div id="win" hidden><div class="card"><h2 id="wt"></h2><div id="ws" class="stats"></div>
<button onclick="rematch()">REMATCH</button><button class="ghost" onclick="location.reload()">MENU</button></div></div>
<button id="pb" hidden onclick="togglePause()">⏸</button>
<div id="pp" hidden><div class="card"><h2>PAUSED</h2>
<button onclick="togglePause()">RESUME</button><button class="ghost" onclick="location.reload()">EXIT</button></div></div>
<canvas id="game"></canvas>
<script>
const $=i=>document.getElementById(i),cv=$('game'),cx=cv.getContext('2d');
// ============================ settings (persisted) ===========================
const OPT={spd:['SLOW','NORMAL','FAST'],pad:['SMALL','MEDIUM','LARGE'],win:[5,7,11],pow:['OFF','ON'],snd:['OFF','ON'],fx:['LOW','MED','HIGH']};
const LBL={spd:'BALL SPEED',pad:'PADDLE',win:'WIN SCORE',pow:'POWER-UPS',snd:'SOUND',fx:'EFFECTS'};
let S={spd:1,pad:1,win:7,pow:1,snd:1,fx:1};try{Object.assign(S,JSON.parse(localStorage.cp||'{}'))}catch(e){}
$('set').innerHTML=Object.keys(OPT).map(k=>'<div class="row"><b>'+LBL[k]+'</b>'+OPT[k].map((o,i)=>{const v=k=='win'?o:i;return '<button data-k="'+k+'" data-v="'+v+'" onclick="setS(\''+k+'\','+v+')">'+o+'</button>'}).join('')+'</div>').join('');
function setS(k,v){S[k]=v;localStorage.cp=JSON.stringify(S);mark();if(k=='fx')initAmb()}
function mark(){document.querySelectorAll('#set button').forEach(b=>b.classList.toggle('on',S[b.dataset.k]==b.dataset.v))}
mark();
const spdMul=()=>[.7,1,1.35][S.spd],PWb=()=>.24*[.75,1,1.3][S.pad];
const FXQ=()=>[.4,1,1.6][S.fx];          // particle count multiplier per quality
const GB=()=>[0,.7,1.2][S.fx];           // glow (shadowBlur) multiplier per quality
// ====================== audio + haptic hooks (event-driven) =================
// Every game event funnels through ev()/onEvent(); sounds and vibration are
// looked up per event kind so premium SFX can be swapped in one place later.
let AC;function snd(k){if(!S.snd)return;try{AC=AC||new(window.AudioContext||window.webkitAudioContext)();
const F={h:660,hs:430,w:300,sc:150,pu:980,us:760,cd:520,go:880,btn:700},D={hs:.12,sc:.3,go:.18,btn:.04},
o=AC.createOscillator(),g=AC.createGain(),d=D[k]||.07;
o.type=(k=='sc'||k=='hs')?'sawtooth':'square';o.frequency.value=F[k]||500;g.gain.setValueAtTime(.12,AC.currentTime);
g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d);
if(k=='win'){[660,880,1100].forEach((f,i)=>setTimeout(()=>snd2(f),i*140))}}catch(e){}}
function snd2(f){try{const o=AC.createOscillator(),g=AC.createGain();o.type='triangle';o.frequency.value=f;
g.gain.setValueAtTime(.14,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.25);
o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+.25)}catch(e){}}
const VIB={h:8,hs:22,w:4,sc:[30,30,30],pu:12,go:15,cd:5,win:[60,40,80]};
function buzz(p){if(S.snd&&p)try{navigator.vibrate&&navigator.vibrate(p)}catch(e){}}
addEventListener('click',e=>{if(e.target.closest('button'))snd('btn')});
// ============================ game state =====================================
// All gameplay entities live in COURT-LOCAL normalized coords (0..1); only
// draw() and input map to screen pixels via CR (courtRect).
const PH=.015,BR=.014;
let mode=0,role=0,ch=null,run=0,over=0,paused=0;
let b={x:.5,y:.5,vx:0,vy:0},tb={x:.5,y:.5};
let padB=.5,padT=.5,gT=.5,prevB=.5,prevT=.5,vB=0,vT=0,wB=.24,wT=.24;
let sc=[0,0],lastHit=0,evN=0,evK='',lastEv=0;
let pu=null,puNext=0,fx=[],T=[];
let cnt=0,cdLast=0,cntG=0,goFlash=0;                       // countdown state
let rally=0,bestRally=0,topSpd=0,stG=[0,0];               // match stats (stG = guest copy)
const PUC=['#0f8','#f55','#ff3','#4af'],PUS=['+','−','⚡','❄'],
      PUL=['PADDLE GROW','FOE SHRINK','LIGHT SPEED','TIME DRAG'];
// ====================== FX systems (reusable, quality-scaled) ================
// P=spark particles  R=expanding shockwave rings  L=floating text labels
// AMB=ambient floaters  pf=per-paddle impact state  shk=screen shake  glitch=goal glitch
let P=[],R=[],L=[],AMB=[],shk=0,flash=0,glitch=0,pf={B:{sq:0,gl:0},T:{sq:0,gl:0}};
function burst(x,y,col,n,dx,dy){n=Math.round(n*FXQ());for(let i=0;i<n;i++){const a=Math.random()*7,s=.002+Math.random()*.006;
  P.push({x,y,vx:Math.cos(a)*s+(dx||0),vy:Math.sin(a)*s+(dy||0),l:1,c:col})}}
function ring(x,y,col,max){R.push({x,y,r:.01,m:max,a:.85,c:col})}
function label(t,x,y,col){L.push({t,x,y,a:1.4,c:col})}
function shake(m){shk=Math.min(11,shk+m)}
function initAmb(){const n=[0,14,26][S.fx];AMB=[];for(let i=0;i<n;i++)AMB.push({x:Math.random(),y:Math.random(),r:.5+Math.random()*1.6,v:.00015+Math.random()*.0004,a:.04+Math.random()*.09})}
// onEvent: single place where every match event becomes feedback (visual+sound+haptic).
// Kinds: hB/hT hit, mB/mT smash, w wall, sc goal, p0..p3 power-up collect, us spawn, cd, go, win.
function onEvent(k,guest){
  const base=k[0]=='h'&&k.length>1?'h':k[0]=='m'?'hs':k[0]=='p'&&k!='pu'?'pu':k;
  snd(base);buzz(VIB[base]);
  if(k[0]=='h'||k[0]=='m'){let s=k[1];if(guest)s=s=='B'?'T':'B';pf[s].sq=1;pf[s].gl=1;
    shake(k[0]=='m'?5:1.8);burst(b.x,b.y,s=='B'?'#0ff':'#f4a',k[0]=='m'?14:6);
    if(k[0]=='m')label('SMASH!',b.x,b.y,'#fff')}
  if(k=='w'){ring(b.x,b.y,'#8df',.08);shake(.8)}
  if(k=='sc'){flash=1;glitch=1;shake(8);ring(.5,.5,'#fff',.6);burst(.5,.5,'#fff',22)}
  if(k[0]=='p'&&k.length==2&&k!='pu'){const i=+k[1];ring(b.x,b.y,PUC[i],.22);burst(b.x,b.y,PUC[i],16);label(PUL[i],b.x,b.y,PUC[i])}
  if(k=='us'&&pu)ring(pu.x,pu.y,PUC[pu.k],.1);
  if(k=='go'){goFlash=520}
}
function ev(k){evN++;evK=k;onEvent(k,false)}      // host/local: fires + replicates to guest
// =========================== responsive layout ===============================
// Screen splits into touch strips + inset court:
//   portrait : [top zone] gap [COURT] gap [bottom zone]
//   landscape: [left zone] gap [COURT] gap [right zone]
// CR is the game world rect (CSS px). G caches per-layout gradients (perf).
let W,H,CR={x:0,y:0,w:0,h:0},zones=[],land=0,G={},scn=null;
const gv=n=>parseFloat(getComputedStyle(document.documentElement).getPropertyValue(n))||0;
const sx=x=>CR.x+x*CR.w, sy=y=>CR.y+y*CR.h;
function layout(){
  const d=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;
  cv.width=W*d;cv.height=H*d;cv.style.width=W+'px';cv.style.height=H+'px';cx.setTransform(d,0,0,d,0,0);
  const st=gv('--sat'),sb=gv('--sab'),sl=gv('--sal'),sr=gv('--sar');
  land=W>H;zones=[];
  const local=mode!=2;
  if(!land){
    const zh=Math.min(Math.max(84,H*.13),140),gap=10,mx=14+Math.max(sl,sr);
    const zb={x:mx,y:H-sb-8-zh,w:W-2*mx,h:zh,tgt:'B',vert:0};zones.push(zb);
    let top=st+12;
    if(local){const zt={x:mx,y:st+8,w:W-2*mx,h:zh,tgt:'T',vert:0};zones.push(zt);top=zt.y+zh+gap}
    CR={x:mx,y:top,w:W-2*mx,h:zb.y-gap-top};
  }else{
    const zw=Math.min(Math.max(84,W*.12),140),gap=10,my=12+Math.max(st,sb);
    const zr={x:W-sr-8-zw,y:my,w:zw,h:H-2*my,tgt:'B',vert:1};zones.push(zr);
    let left=sl+14;
    if(local){const zl={x:sl+8,y:my,w:zw,h:H-2*my,tgt:'T',vert:1};zones.push(zl);left=zl.x+zw+gap}
    CR={x:left,y:my,w:zr.x-gap-left,h:H-2*my};
  }
  // cached gradients (recreated only on layout change, never per frame)
  G.bg=cx.createLinearGradient(0,0,0,H);G.bg.addColorStop(0,'#0b0b26');G.bg.addColorStop(.45,'#070716');G.bg.addColorStop(1,'#0d0a24');
  G.hor=cx.createRadialGradient(W/2,CR.y+CR.h/2,10,W/2,CR.y+CR.h/2,Math.max(W,H)*.7);
  G.hor.addColorStop(0,'rgba(40,80,220,.12)');G.hor.addColorStop(.5,'rgba(20,40,120,.05)');G.hor.addColorStop(1,'rgba(0,0,0,0)');
  G.vin=cx.createRadialGradient(W/2,H/2,Math.min(W,H)*.45,W/2,H/2,Math.max(W,H)*.78);
  G.vin.addColorStop(0,'rgba(0,0,0,0)');G.vin.addColorStop(1,'rgba(0,0,8,.5)');
  G.glass=cx.createLinearGradient(CR.x,CR.y,CR.x+CR.w,CR.y+CR.h);
  G.glass.addColorStop(0,'rgba(160,220,255,.04)');G.glass.addColorStop(.5,'rgba(160,220,255,0)');G.glass.addColorStop(1,'rgba(255,120,220,.03)');
  // 1×3 scanline pattern (drawn full-screen only on HIGH quality)
  scn=document.createElement('canvas');scn.width=1;scn.height=3;
  const sg=scn.getContext('2d');sg.fillStyle='rgba(180,220,255,.05)';sg.fillRect(0,0,1,1);
  G.scn=cx.createPattern(scn,'repeat');
}
addEventListener('resize',layout);
addEventListener('orientationchange',()=>setTimeout(layout,60));
layout();initAmb();
// ============================ flow helpers ===================================
function serve(){const sp=.0075*spdMul();b={x:.5,y:.5,vx:(Math.random()-.5)*sp,vy:(Math.random()<.5?1:-1)*sp};run=1;rally=0}
function reset(){sc=[0,0];over=0;run=0;cnt=0;goFlash=0;b={x:.5,y:.5,vx:0,vy:0};tb={x:.5,y:.5};
  fx=[];pu=null;puNext=performance.now()+6000;T=[];P=[];R=[];L=[];rally=0;bestRally=0;topSpd=0;$('win').hidden=true}
function tap(){
  if(over){if(mode==1||role==0)reset();return}
  if(!run&&!cnt){
    if(mode==1||role==0){cnt=2099;cdLast=3;ev('cd')}
    else if(ch&&ch.open)ch.send({t:'t'})}
}
function rematch(){snd('btn');if(mode==1||role==0)reset();else if(ch&&ch.open){$('win').hidden=true;ch.send({t:'t'})}}
function togglePause(){if(mode!=1)return;paused=!paused;$('pp').hidden=!paused}
// ==================== touch-zone -> paddle mapping ===========================
// A finger inside a zone maps its position along the strip to the paddle's
// court-local x (absolute mapping, clamped to the court).
function clampPad(v,t){const w=t=='B'?wB:wT;return Math.max(w/2,Math.min(1-w/2,v))}
function applyPoint(px,py){
  for(const z of zones){
    if(px<z.x||px>z.x+z.w||py<z.y||py>z.y+z.h)continue;
    const v=z.vert?(py-z.y)/z.h:(px-z.x)/z.w;
    if(z.tgt=='B')padB=clampPad(v,'B');
    else if(mode==1)padT=clampPad(v,'T');
    return true}
  return false}
function move(ts){
  for(const t of ts)applyPoint(t.clientX,t.clientY);
  if(mode==2&&role==1&&ch&&ch.open)ch.send({t:'p',x:+(1-padB).toFixed(4)});
}
addEventListener('touchstart',e=>{if(!mode||e.target.closest('button'))return;e.preventDefault();tap();move(e.touches)},{passive:false});
addEventListener('touchmove',e=>{if(!mode)return;e.preventDefault();move(e.touches)},{passive:false});
addEventListener('mousedown',e=>{if(!mode||e.target.closest('button'))return;tap();move([e])});
addEventListener('mousemove',e=>{if(mode&&e.buttons)move([e])});
// =================== power-ups & physics (court-local) =======================
function widths(n){let B=PWb(),T2=PWb();fx=fx.filter(f=>f.end>n);
  for(const f of fx){if(f.k==0)f.who?T2*=1.6:B*=1.6;if(f.k==1)f.who?B*=.55:T2*=.55}
  wB=Math.min(B,.5);wT=Math.min(T2,.5)}
function apply(k,who,n){
  if(k<2)fx.push({k,who,end:n+7000});
  else{const m=k==2?1.45:.6,sp=Math.hypot(b.vx,b.vy),ns=Math.min(Math.max(sp*m,.005),.03);
    b.vx*=ns/sp;b.vy*=ns/sp}}
function physics(n,dt){
  b.x+=b.vx*dt;b.y+=b.vy*dt;
  if(b.x<BR){b.x=BR;b.vx=Math.abs(b.vx);ev('w')}
  if(b.x>1-BR){b.x=1-BR;b.vx=-Math.abs(b.vx);ev('w')}
  // racket physics: contact point steers; swing speed at impact adds pace and bends the angle
  const hit=(px,up,pv,w)=>{
    if(Math.abs(b.x-px)>w/2+BR)return;
    b.y=(up?.95:.05)+(up?-1:1)*(PH+BR);
    let sp=Math.hypot(b.vx,b.vy)*(1.03+Math.min(Math.abs(pv)*10,.6));
    sp=Math.min(Math.max(sp,.006),.03);
    let ang=(b.x-px)/(w/2)+pv*7;ang=Math.max(-1.25,Math.min(1.25,ang));
    b.vx=Math.sin(ang)*sp;b.vy=(up?-1:1)*Math.abs(Math.cos(ang))*sp;
    lastHit=up?0:1;rally++;topSpd=Math.max(topSpd,sp);
    ev((Math.abs(pv)>.025?'m':'h')+(up?'B':'T'))};
  if(b.vy>0&&b.y>.95-PH-BR&&b.y<.97)hit(padB,1,vB,wB);
  if(b.vy<0&&b.y<.05+PH+BR&&b.y>.03)hit(padT,0,vT,wT);
  if(S.pow&&!pu&&n>puNext){pu={x:.15+Math.random()*.7,y:.35+Math.random()*.3,k:Math.random()*4|0,born:n};ev('us')}
  if(pu&&Math.abs(b.x-pu.x)<.055&&Math.abs(b.y-pu.y)<.055){
    const k=pu.k;apply(k,lastHit,n);pu=null;puNext=n+7000+Math.random()*6000;ev('p'+k)}
  if(b.y>1.05){sc[1]++;point()}else if(b.y<-.05){sc[0]++;point()}
}
function point(){run=0;b={x:.5,y:.5,vx:0,vy:0};bestRally=Math.max(bestRally,rally);rally=0;
  ev('sc');if(sc[0]>=S.win||sc[1]>=S.win)over=1}
// ============================== rendering ====================================
// Order: shake-transform -> backdrop (gradient/horizon/ambient) -> court frame
// -> clipped game world (grid, orb, trail, ball, paddles, sparks) -> rings &
// labels -> countdown -> zones/HUD -> un-shake -> vignette/scanlines/glitch.
const rr=(x,y,w,h,r)=>{cx.beginPath();cx.roundRect?cx.roundRect(x,y,w,h,r):cx.rect(x,y,w,h);cx.fill()};
function courtPath(){cx.beginPath();cx.roundRect?cx.roundRect(CR.x,CR.y,CR.w,CR.h,14):cx.rect(CR.x,CR.y,CR.w,CR.h)}
function glow(c,v){cx.shadowColor=c;cx.shadowBlur=v*GB()}
function drawBack(n,dt){
  cx.fillStyle=G.bg;cx.fillRect(0,0,W,H);
  cx.fillStyle=G.hor;cx.globalAlpha=.7+.3*Math.sin(n*.0008);cx.fillRect(0,0,W,H);cx.globalAlpha=1; // breathing horizon glow
  for(const a of AMB){a.y-=a.v*dt*8;if(a.y<0){a.y=1;a.x=Math.random()}
    cx.globalAlpha=a.a;cx.fillStyle='#9fd4ff';cx.fillRect(a.x*W,a.y*H,a.r,a.r)}
  cx.globalAlpha=1;
}
function drawCourt(n){
  cx.fillStyle='#06061a';courtPath();cx.fill();
  cx.fillStyle=G.glass;courtPath();cx.fill();                       // glass sheen
  // energy-field border: static base + two counter-flowing dashes (cyan/magenta)
  glow('#0ff',8);cx.strokeStyle='rgba(0,240,255,.22)';cx.lineWidth=1.5;courtPath();cx.stroke();cx.shadowBlur=0;
  cx.lineWidth=2;
  cx.setLineDash([26,110]);cx.lineDashOffset=-n*.05;cx.strokeStyle='rgba(0,240,255,.55)';courtPath();cx.stroke();
  cx.lineDashOffset=n*.05+60;cx.strokeStyle='rgba(255,68,170,.45)';courtPath();cx.stroke();
  cx.setLineDash([]);cx.lineWidth=1;
  // corner HUD brackets
  cx.strokeStyle='rgba(160,220,255,.35)';const c=12;
  [[CR.x+4,CR.y+4,1,1],[CR.x+CR.w-4,CR.y+4,-1,1],[CR.x+4,CR.y+CR.h-4,1,-1],[CR.x+CR.w-4,CR.y+CR.h-4,-1,-1]]
  .forEach(([x,y,dx,dy])=>{cx.beginPath();cx.moveTo(x+dx*c,y);cx.lineTo(x,y);cx.lineTo(x,y+dy*c);cx.stroke()});
  // pulsing center line + scoring zones
  const p=.1+.06*Math.sin(n*.002);
  cx.strokeStyle='rgba(120,200,255,'+p+')';cx.setLineDash([10,12]);
  cx.beginPath();cx.moveTo(CR.x+8,sy(.5));cx.lineTo(CR.x+CR.w-8,sy(.5));cx.stroke();cx.setLineDash([]);
  let gz=cx.createLinearGradient(0,CR.y,0,CR.y+CR.h*.06);
  gz.addColorStop(0,'rgba(255,68,170,'+(p*.9)+')');gz.addColorStop(1,'rgba(255,68,170,0)');
  cx.fillStyle=gz;cx.fillRect(CR.x,CR.y,CR.w,CR.h*.06);
  gz=cx.createLinearGradient(0,CR.y+CR.h,0,CR.y+CR.h*.94);
  gz.addColorStop(0,'rgba(0,240,255,'+(p*.9)+')');gz.addColorStop(1,'rgba(0,240,255,0)');
  cx.fillStyle=gz;cx.fillRect(CR.x,CR.y+CR.h*.94,CR.w,CR.h*.06);
}
function drawGrid(n){
  // animated holo-grid inside the court, parallax-shifted by ball position
  const par=(b.x-.5)*10,sp=CR.h/9,off=(n*.012)%sp;
  cx.strokeStyle='rgba(0,180,255,.05)';cx.beginPath();
  for(let y=CR.y+off;y<CR.y+CR.h;y+=sp){cx.moveTo(CR.x,y);cx.lineTo(CR.x+CR.w,y)}
  for(let i=1;i<8;i++){const x=CR.x+CR.w*i/8+par;cx.moveTo(x,CR.y);cx.lineTo(x,CR.y+CR.h)}
  cx.stroke();
}
function drawOrb(n){ // power-up: pulsing energy orb with per-type aura
  if(!pu)return;
  const x=sx(pu.x),y=sy(pu.y),base=Math.max(12,CR.w*.04),r=base*(1+.1*Math.sin(n*.006)),C=PUC[pu.k];
  cx.globalAlpha=.5;cx.strokeStyle=C;
  if(pu.k==0||pu.k==1){ // grow: rings expand out / shrink: rings collapse in
    const t=(n%1200)/1200,rr2=pu.k==0?t:1-t;
    cx.globalAlpha=.5*(1-rr2);cx.beginPath();cx.arc(x,y,r*(.8+rr2*1.4),0,7);cx.stroke()}
  else if(pu.k==2){for(let i=0;i<3;i++){const a=n*.004+i*2.1; // lightning spokes
    cx.beginPath();cx.moveTo(x+Math.cos(a)*r*1.1,y+Math.sin(a)*r*1.1);cx.lineTo(x+Math.cos(a)*r*1.7,y+Math.sin(a)*r*1.7);cx.stroke()}}
  else{cx.globalAlpha=.25+.15*Math.sin(n*.003);cx.beginPath();cx.arc(x,y,r*1.5,0,7);cx.stroke()} // time halo
  cx.globalAlpha=1;
  const og=cx.createRadialGradient(x,y,1,x,y,r);og.addColorStop(0,'#fff');og.addColorStop(.35,C);og.addColorStop(1,'rgba(0,0,0,0)');
  glow(C,16);cx.fillStyle=og;cx.beginPath();cx.arc(x,y,r,0,7);cx.fill();cx.shadowBlur=0;
  cx.fillStyle='#001';cx.font='bold '+Math.round(r*.95)+'px "Segoe UI"';cx.textAlign='center';cx.fillText(PUS[pu.k],x,y+r*.34);
}
function drawBall(n){
  const spd=Math.hypot(b.vx,b.vy),r=BR*CR.w;
  // comet trail: length & intensity scale with speed
  const len=Math.min(T.length,Math.round(6+spd*900));
  for(let i=T.length-len;i<T.length;i++){if(i<0)continue;const a=(i-(T.length-len))/len;
    cx.fillStyle='rgba(140,240,255,'+(a*.4*(spd*60+.3))+')';
    cx.beginPath();cx.arc(sx(T[i].x),sy(T[i].y),r*a,0,7);cx.fill()}
  if(spd>.017){ // smash streak: elongated glow opposite the velocity
    cx.globalAlpha=.5;const k=14*CR.w/375;
    const sg2=cx.createLinearGradient(sx(b.x)-b.vx*k*60,sy(b.y)-b.vy*k*60,sx(b.x),sy(b.y));
    sg2.addColorStop(0,'rgba(255,255,255,0)');sg2.addColorStop(1,'rgba(200,250,255,.7)');
    cx.strokeStyle=sg2;cx.lineWidth=r*1.2;cx.lineCap='round';
    cx.beginPath();cx.moveTo(sx(b.x)-b.vx*k*60,sy(b.y)-b.vy*k*60);cx.lineTo(sx(b.x),sy(b.y));cx.stroke();
    cx.lineWidth=1;cx.globalAlpha=1}
  if(!mode)return;
  const bg2=cx.createRadialGradient(sx(b.x),sy(b.y),1,sx(b.x),sy(b.y),r*2.4);
  bg2.addColorStop(0,'#fff');bg2.addColorStop(.4,'rgba(190,245,255,.9)');bg2.addColorStop(1,'rgba(120,220,255,0)');
  glow('#aff',18);cx.fillStyle=bg2;cx.beginPath();cx.arc(sx(b.x),sy(b.y),r*2.4,0,7);cx.fill();cx.shadowBlur=0;
}
function drawPaddle(px,w,top,v,f,dt){ // neon racket: core line, glow, end nodes, squash & charge
  f.sq=Math.max(0,f.sq-.07*dt);f.gl=Math.max(0,f.gl-.05*dt);
  const charged=Math.abs(v)>.02,C=top?'#f4a':'#0ff',CL=top?'#ffd2ec':'#d8ffff';
  const ww=w*CR.w*(1+.13*f.sq),hh=(PH*CR.h+3)*(1-.3*f.sq)+(charged?2:0);
  const x=sx(px)-ww/2,y=top?sy(.05-PH):sy(.95)-3;
  glow(C,(14+f.gl*18+(charged?10:0)));cx.fillStyle=C;rr(x,y,ww,hh,5);cx.shadowBlur=0;
  cx.fillStyle=CL;rr(x+ww*.08,y+hh*.32,ww*.84,hh*.36,3);                       // bright core line
  cx.fillStyle='#fff';cx.beginPath();cx.arc(x+3,y+hh/2,1.8,0,7);cx.arc(x+ww-3,y+hh/2,1.8,0,7);cx.fill(); // end nodes
}
function drawFX(dt){ // particles, shockwave rings, floating labels — all dt-scaled
  for(let i=P.length-1;i>=0;i--){const p=P[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.l-=.03*dt;
    if(p.l<=0){P.splice(i,1);continue}
    cx.globalAlpha=p.l;cx.fillStyle=p.c;cx.fillRect(sx(p.x)-2,sy(p.y)-2,4,4)}
  cx.globalAlpha=1;
  for(let i=R.length-1;i>=0;i--){const q=R[i];q.r+=(q.m-q.r)*.14*dt;q.a-=.04*dt;
    if(q.a<=0){R.splice(i,1);continue}
    cx.globalAlpha=q.a;cx.strokeStyle=q.c;cx.lineWidth=2;
    cx.beginPath();cx.arc(sx(q.x),sy(q.y),q.r*CR.w,0,7);cx.stroke()}
  cx.lineWidth=1;
  for(let i=L.length-1;i>=0;i--){const l=L[i];l.y-=.0025*dt;l.a-=.025*dt;
    if(l.a<=0){L.splice(i,1);continue}
    cx.globalAlpha=Math.min(1,l.a);glow(l.c,10);cx.fillStyle=l.c;
    cx.font='800 17px "Segoe UI"';cx.textAlign='center';cx.fillText(l.t,sx(l.x),sy(l.y));cx.shadowBlur=0}
  cx.globalAlpha=1;
}
let scA=[0,0],scP=[0,0]; // score pop animation state
function drawZones(n,dt){
  for(let i=0;i<2;i++){if(sc[i]!=scP[i]){scA[i]=1;scP[i]=sc[i]}scA[i]=Math.max(0,scA[i]-.04*dt)}
  const mp=!over&&(sc[0]==S.win-1||sc[1]==S.win-1);
  for(const z of zones){
    const C=z.tgt=='B'?'0,240,255':'255,68,170',i=z.tgt=='B'?0:1;
    cx.fillStyle='rgba('+C+',.05)';rr(z.x,z.y,z.w,z.h,16);
    cx.strokeStyle='rgba('+C+','+(mp&&sc[i]==S.win-1?.32+.22*Math.sin(n*.01):.2)+')';cx.lineWidth=1;
    cx.beginPath();cx.roundRect?cx.roundRect(z.x+.5,z.y+.5,z.w-1,z.h-1,16):cx.rect(z.x,z.y,z.w,z.h);cx.stroke();
    cx.save();cx.translate(z.x+z.w/2,z.y+z.h/2);
    if(!land&&z.tgt=='T'&&mode==1)cx.rotate(Math.PI);
    cx.textAlign='center';
    const fs=26*(1+.7*scA[i]);
    if(z.vert){
      glow('rgb('+C+')',8);cx.fillStyle='rgba('+C+',.95)';cx.font='800 '+fs+'px "Segoe UI"';cx.fillText(sc[i],0,-z.h/2+36);cx.shadowBlur=0;
      if(mode==2){cx.fillStyle='rgba(255,68,170,.9)';cx.font='800 '+(26*(1+.7*scA[1]))+'px "Segoe UI"';cx.fillText(sc[1],0,z.h/2-18)}
      cx.fillStyle='rgba('+C+',.3)';cx.font='600 14px "Segoe UI"';cx.fillText('⌃',0,-10);cx.fillText('⌄',0,18);
    }else{
      glow('rgb('+C+')',8);cx.fillStyle='rgba('+C+',.95)';cx.font='800 '+fs+'px "Segoe UI"';cx.fillText(sc[i],-z.w/2+32,9);cx.shadowBlur=0;
      if(mode==2){cx.fillStyle='rgba(255,68,170,.9)';cx.font='800 '+(26*(1+.7*scA[1]))+'px "Segoe UI"';cx.fillText(sc[1],z.w/2-32,9)}
      cx.fillStyle='rgba('+C+',.3)';cx.font='600 12px "Segoe UI"';
      cx.fillText(mp&&sc[i]==S.win-1?'MATCH POINT':'‹  drag to move  ›',0,5);
    }
    cx.restore();
  }
}
function draw(n,dt){
  // screen shake (decays with dt); whole arena shifts, post overlays stay fixed
  shk=Math.max(0,shk-.5*dt);
  const ox=(Math.random()-.5)*shk,oy=(Math.random()-.5)*shk;
  cx.save();cx.translate(ox,oy);
  drawBack(n,dt);
  drawCourt(n);
  cx.save();courtPath();cx.clip();
  drawGrid(n);drawOrb(n);drawBall(n);
  drawPaddle(padT,wT,1,vT,pf.T,dt);
  drawPaddle(padB,wB,0,vB,pf.B,dt);
  drawFX(dt);
  cx.restore();
  // countdown / GO / start hint (center court)
  const cd=(mode==2&&role==1)?cntG:(cnt>0?Math.ceil(cnt/700):0);
  cx.textAlign='center';
  if(cd>0){const ph=cnt>0?(cnt%700)/700:.5;
    glow('#0ff',20);cx.fillStyle='rgba(220,250,255,'+(.4+.6*ph)+')';
    cx.font='200 '+Math.round(CR.w*.3*(1.25-ph*.25))+'px "Segoe UI"';cx.fillText(cd,sx(.5),sy(.5)+CR.w*.1);cx.shadowBlur=0}
  else if(goFlash>0){goFlash-=16*dt;glow('#0ff',24);cx.fillStyle='rgba(190,255,255,'+Math.min(1,goFlash/300)+')';
    cx.font='800 '+Math.round(CR.w*.16)+'px "Segoe UI"';cx.fillText('GO!',sx(.5),sy(.5)+CR.w*.05);cx.shadowBlur=0}
  else if(!run&&mode&&!over){cx.fillStyle='rgba(160,220,255,'+(.5+.3*Math.sin(n*.004))+')';
    cx.font='600 '+Math.max(14,Math.min(19,CR.w*.045))+'px "Segoe UI"';
    cx.fillText(mode==2&&role==1?'TAP WHEN READY':'TAP TO START',sx(.5),sy(.5)+44)}
  drawZones(n,dt);
  cx.restore();
  // fixed post-fx: vignette, scanlines (high quality), goal flash, glitch slices
  cx.fillStyle=G.vin;cx.fillRect(0,0,W,H);
  if(S.fx==2){cx.fillStyle=G.scn;cx.fillRect(0,0,W,H)}
  if(flash>0){cx.strokeStyle='rgba(0,240,255,'+flash*.7+')';cx.lineWidth=7;courtPath();cx.stroke();cx.lineWidth=1;
    cx.fillStyle='rgba(160,240,255,'+flash*.08+')';cx.fillRect(0,0,W,H);flash-=.04*dt}
  if(glitch>0&&S.fx>0){for(let i=0;i<3;i++){const y=CR.y+Math.random()*CR.h;
    cx.globalAlpha=glitch*.5;cx.strokeStyle=i%2?'rgba(0,240,255,.8)':'rgba(255,68,170,.8)';
    cx.beginPath();cx.moveTo(CR.x+Math.random()*20,y);cx.lineTo(CR.x+CR.w-Math.random()*20,y);cx.stroke()}
    cx.globalAlpha=1;glitch-=.06*dt}
}
// ================================ main loop ==================================
let lastN=performance.now(),winShown=false;
function loop(){
  const n=performance.now(),ms=Math.min(50,n-lastN),dt=ms/16.667;lastN=n;
  if(!paused){
    if(mode==1||role==0){
      widths(n);
      if(mode==2)padT+=(gT-padT)*.5;
      vB=(padB-prevB)*(.6/Math.max(.5,dt))+vB*.4;prevB=padB;
      vT=(padT-prevT)*(.6/Math.max(.5,dt))+vT*.4;prevT=padT;
      if(cnt>0){cnt-=ms;const num=Math.ceil(Math.max(cnt,1)/700);
        if(num!=cdLast&&cnt>0){cdLast=num;ev('cd')}
        if(cnt<=0){cnt=0;serve();ev('go')}}
      if(run)physics(n,dt);
      if(ch&&ch.open)ch.send({t:'s',b:[+b.x.toFixed(4),+b.y.toFixed(4)],p:+padB.toFixed(4),s:sc,r:run,o:over,
        w:[+wB.toFixed(3),+wT.toFixed(3)],u:pu?[+pu.x.toFixed(3),+pu.y.toFixed(3),pu.k]:0,e:[evN,evK],
        c:cnt>0?Math.ceil(cnt/700):0,st:[bestRally,+topSpd.toFixed(4)]});
    }else if(mode==2){b.x+=(tb.x-b.x)*.55;b.y+=(tb.y-b.y)*.55}
    if(run){T.push({x:b.x,y:b.y});if(T.length>22)T.shift()}else if(T.length)T=[];
  }
  if(mode)draw(n,dt);
  if(over&&!winShown)showWin();if(!over&&winShown){winShown=false;$('win').hidden=true}
  requestAnimationFrame(loop)}
loop();
// =============================== win screen ==================================
function showWin(){winShown=true;snd('win');buzz(VIB.win);
  const iWon=sc[0]>sc[1],wt=$('wt');
  wt.textContent=mode==1?(iWon?'CYAN WINS':'MAGENTA WINS'):(iWon?'YOU WIN! 🏆':'YOU LOSE');
  wt.style.color=iWon?'var(--cy)':'var(--mg)';wt.style.textShadow='0 0 24px '+(iWon?'var(--cy)':'var(--mg)');
  const st=(mode==2&&role==1)?stG:[bestRally,topSpd];
  $('ws').innerHTML='SCORE <b>'+sc[0]+' — '+sc[1]+'</b><br>BEST RALLY <b>'+st[0]+' hits</b><br>TOP SPEED <b>'+
    (st[1]>0?(st[1]/(.0075*spdMul())).toFixed(1):'1.0')+'× serve</b>';
  $('win').hidden=false}
function startGame(){$('menu').hidden=$('link').hidden=true;$('pb').hidden=mode!=1;reset();layout()}
function startLocal(){mode=1;startGame()}
// ====== pairing: QR is a URL; native camera opens it & auto-joins (PeerJS) ======
const ICE={iceServers:[
  {urls:['stun:stun.l.google.com:19302','stun:stun1.l.google.com:19302']},
  {urls:'turn:openrelay.metered.ca:80',username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443',username:'openrelayproject',credential:'openrelayproject'}]};
let peer=null,hostCode=null;
function ui(m,pulse){const e=$('msg');e.textContent=m;e.classList.toggle('pulse',!!pulse)}
function showQR(txt){const q=$('qr'),c=qrcode(0,'L');c.addData(txt);c.make();
  const n=c.getModuleCount(),s=Math.max(2,Math.floor(Math.min(innerWidth*.66,300)/n));
  $('qrw').hidden=false;q.width=q.height=n*s;const g2=q.getContext('2d');
  g2.fillStyle='#fff';g2.fillRect(0,0,q.width,q.height);g2.fillStyle='#000';
  for(let r=0;r<n;r++)for(let o=0;o<n;o++)if(c.isDark(r,o))g2.fillRect(o*s,r*s,s,s)}
function wire(c){ch=c;
  const go=()=>{if(mode==2){$('link').hidden=true;$('menu').hidden=true}else{mode=2;startGame()}};
  ch.open?go():ch.on('open',go);
  ch.on('data',d=>{
    if(d.t=='p')gT=d.x;
    if(d.t=='t'){if(over)reset();else if(!run&&!cnt){cnt=2099;cdLast=3;ev('cd')}}
    if(d.t=='s'){tb={x:1-d.b[0],y:1-d.b[1]};padT=1-d.p;sc=[d.s[1],d.s[0]];run=d.r;over=d.o;
      wB=d.w[1];wT=d.w[0];pu=d.u?{x:1-d.u[0],y:1-d.u[1],k:d.u[2]}:null;
      cntG=d.c||0;if(d.st)stG=d.st;
      if(d.e&&d.e[0]!=lastEv){lastEv=d.e[0];onEvent(d.e[1],true)}}});
  ch.on('close',()=>{
    if(mode!=2)return;
    if(role==1)rejoin(4);
    else{$('link').hidden=false;$('qrw').hidden=true;$('code').textContent='';
      ui('Player 2 disconnected — waiting for them to come back…',true)}});
}
function rejoin(n){
  if(n<=0){ui('Connection lost — reload to start over');return}
  $('link').hidden=false;ui('Reconnecting…',true);
  const c=peer.connect('campong-'+hostCode,{reliable:true});let ok=0;
  c.on('open',()=>{ok=1;wire(c)});
  setTimeout(()=>{if(!ok)rejoin(n-1)},4000)}
function perr(e){if(e.type=='peer-unavailable')ui(role==1?'Game not found — check the code on the host phone':'Error — reload to retry');
  else ui('Connection error ('+e.type+') — tap CANCEL and retry')}
function startHost(){role=0;$('menu').hidden=true;$('link').hidden=false;ui('Creating arena…',true);
  let code='';for(let i=0;i<4;i++)code+='ABCDEFGHJKMNPQRSTUVWXYZ23456789'[Math.random()*31|0];
  hostCode=code;
  peer=new Peer('campong-'+code,{config:ICE});
  peer.on('open',()=>{showQR(location.origin+location.pathname+'#'+code);$('code').textContent=code;
    ui('Waiting for player 2 — scan with the phone camera, or JOIN WITH CODE:',true)});
  peer.on('connection',c=>{$('qrw').hidden=true;ui('Player found — connecting…',true);wire(c)});
  peer.on('disconnected',()=>peer.reconnect());
  peer.on('error',perr)}
function startJoin(code){role=1;$('menu').hidden=true;$('link').hidden=false;
  hostCode=code.trim().toUpperCase();$('code').textContent=hostCode;ui('Joining arena…',true);
  peer=new Peer({config:ICE});
  peer.on('open',()=>wire(peer.connect('campong-'+hostCode,{reliable:true})));
  peer.on('disconnected',()=>peer.reconnect());
  peer.on('error',perr)}
function askJoin(){const c=prompt('Enter the 4-letter code shown on the host phone:');if(c)startJoin(c)}
if(location.hash.length>1){const c=location.hash.slice(1);history.replaceState(null,'',location.pathname);startJoin(c)}
if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
